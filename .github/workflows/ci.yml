name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,docs]

      - name: Compile Python sources
        run: python -m compileall morphkit docs/build_versioned_docs.py

      - name: Build package artifacts
        run: python -m build

      - name: Build docs from source
        run: python -m sphinx -b html docs/source docs/_check/html

      - name: Verify version metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          namespace = {}
          exec(Path("morphkit/_version.py").read_text(encoding="utf-8"), namespace)
          version = namespace["__version__"]
          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          assert "morphkit._version.__version__" in pyproject
          assert version == "1.0.0"
          print(f"Verified Morphkit version {version}")
          PY
